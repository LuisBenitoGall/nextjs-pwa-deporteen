schema: spec-driven

context: |
  Proyecto: DeporTeen (PWA para gestión de deportistas menores y sus competiciones).

  **Propósito del sistema**
  - Permitir a madres/padres/tutores gestionar la trayectoria deportiva de menores:
    - Alta de jugadores (hijos/as) vinculados a una suscripción.
    - Registro de competiciones, partidos y estadísticas.
    - Captura y gestión de fotos/vídeos asociados a los partidos.
  - Centralizar la gestión de suscripciones (seats) y pagos (Stripe) garantizando límites claros por jugador.
  - Ofrecer una experiencia tipo app nativa (PWA) optimizada para móvil, incluyendo modo semi-offline, wake lock y A2HS.
  - Cumplir requisitos legales estrictos sobre menores, privacidad, cookies y tratamiento de imágenes.

  **Arquitectura general**
  - Frontend: Next.js App Router (React + TypeScript), con componentes server/client y rutas en `src/app`.
  - Backend: API Routes de Next.js (route handlers) que actúan como capa BFF sobre:
    - Supabase (PostgreSQL + Auth + Storage) para datos de dominio y RPCs.
    - Stripe para pagos, suscripciones y Customer Portal.
  - PWA: Service Worker propio en `public/service-worker.js`, hooks (`useA2HS`, `useWakeLock`) y manifest en `src/app/manifest.ts`.
  - Internacionalización: `src/i18n/*` con ficheros de mensajes JSON por idioma.
  - Tests: Vitest + Testing Library con mocks de Supabase/Next y tests de dominio (seats, subscriptions, seasons, rpc-validator, etc.).

  **Módulos y responsabilidades (vista lógica)**
  - authentication:
    - Login/registro, recuperación de contraseña, gestión de perfil y cierre de sesión.
    - Middleware de autenticación y roles (incluyendo admin).
  - players:
    - Alta y gestión de jugadores (hijos/as), temporadas de jugador y su presentación en el dashboard.
  - matches:
    - Competiciones, partidos, vista en vivo, edición, estadísticas por deporte y galería de partido.
  - subscriptions:
    - Modelo de suscripciones, seats, códigos de acceso, vinculación jugador–suscripción y estado de suscripción.
  - billing-payments (incluido en la spec de suscripciones):
    - Integración con Stripe (checkout, portal, webhooks), pagos únicos y facturación.
  - media (cubierto principalmente en la spec de matches):
    - Captura y almacenamiento de fotos/vídeos de partidos, uso de IndexedDB y, opcionalmente, Supabase Storage.
  - internationalization:
    - Locales soportados, mensajes por idioma, sincronización de traducciones y switches de idioma.
  - pwa:
    - Service worker, política de caché, comportamiento offline parcial y UX específica de dispositivo.
  - statistics:
    - Modelo flexible de estadísticas por deporte y representación en vistas de partido.
  - admin:
    - Panel de administración (principalmente sobre Stripe) y reglas de acceso admin.
  - legal-compliance:
    - Páginas legales, consentimiento de cookies, textos sobre menores y políticas de contenidos.
  - database:
    - Esquema SQL, migraciones y RPCs clave descritos en `openspec/DATABASE_SCHEMA.md` y `database/`.

  **Dependencias externas clave**
  - Supabase:
    - Autenticación de usuarios, RLS, tablas de dominio (users, players, seasons, competitions, matches, subscriptions, access_codes, etc.).
    - RPCs de negocio: `seats_remaining`, `ensure_profile_server`, `create_code_subscription`, `create_player_link_subscription`, entre otras.
  - Stripe:
    - Checkout (creación de sesiones), Customer Portal, webhooks de suscripción/pago y consultas de pagos/facturas.
  - Infra/UI:
    - Radix UI + componentes tipo shadcn para diálogos/forms.
    - `react-hook-form` + `zod` (validaciones de formularios).
    - `date-fns`, `recharts`, `lucide-react`, utilidades CSS/Tailwind.
  - Herramientas internas:
    - Scripts personalizados en `scripts/` para sincronizar i18n, configurar Stripe y migrar datos.

modules:
  authentication:
    description: Autenticación, sesión, roles y gestión de perfil.
    specs:
      - specs/authentication/spec.md
    code:
      - src/middleware.ts
      - src/lib/auth/roles.ts
      - src/lib/supabase/*
      - src/app/login/*
      - src/app/registro/*
      - src/app/forgot-password/*
      - src/app/auth/reset-password/*
      - src/app/account/*

  players:
    description: Gestión de jugadores, temporadas y vista de dashboard.
    specs:
      - specs/players/spec.md
    code:
      - src/app/dashboard/*
      - src/app/players/*
      - src/lib/seasons.ts
      - src/lib/seasons.test.ts

  matches:
    description: Competiciones, partidos, vista en vivo y multimedia asociada.
    specs:
      - specs/matches/spec.md
    code:
      - src/app/players/[id]/competitions/*
      - src/app/matches/*
      - src/app/api/matches/*
      - src/lib/sports/*
      - src/lib/uploadMatchMedia.ts
      - src/lib/mediaSync.ts
      - src/lib/mediaLocal.ts

  subscriptions:
    description: Suscripciones, seats, códigos de acceso y pagos (Stripe).
    specs:
      - specs/subscriptions/spec.md
    code:
      - src/app/subscription/*
      - src/app/billing/*
      - src/app/api/stripe/*
      - src/app/api/admin/stripe/*
      - src/lib/subscriptions.ts
      - src/lib/subscription-plans.ts
      - src/lib/seats.ts
      - src/lib/stripe/*
      - src/lib/stripe-payments.ts
      - src/lib/stripe-customer.ts
      - database/*

  internationalization:
    description: Internacionalización, mensajes por idioma y sincronización de traducciones.
    specs:
      - specs/internationalization/spec.md
    code:
      - src/i18n/*
      - src/components/LanguageSwitcher.tsx
      - scripts/sync-i18n.ts

  pwa:
    description: Comportamiento PWA, offline parcial, service worker y UX móvil.
    specs:
      - specs/pwa/spec.md
    code:
      - public/service-worker.js
      - src/app/manifest.ts
      - src/app/layout.tsx
      - src/components/ServiceWorkerRegistrar.tsx
      - src/lib/useA2HS.ts
      - src/lib/useWakeLock.ts
      - src/lib/indexeddb.ts

  statistics:
    description: Modelo de estadísticas por deporte y visualización de rendimiento.
    specs:
      - specs/statistics/spec.md
    code:
      - src/lib/sports/*
      - src/app/matches/[id]/live/page.tsx
      - componentes que muestren gráficos (recharts)

  admin:
    description: Panel de administración y operaciones avanzadas (principalmente sobre Stripe).
    specs:
      - specs/admin/spec.md
    code:
      - src/app/admin/*
      - src/lib/auth/roles.ts
      - src/lib/stripe/*
      - scripts/stripe-*.ts

  legal-compliance:
    description: Cumplimiento legal (menores, privacidad, cookies, términos) y sus reflejos técnicos.
    specs:
      - specs/legal-compliance/spec.md
    code:
      - src/app/legal/*
      - src/components/CookieBanner.tsx
      - src/components/CookiePreferences.tsx
      - src/app/api/cookies/consent/*
      - src/middleware.ts
      - claves `legal.*` en src/i18n/messages/*

dependencies:
  external:
    - name: Supabase
      description: Backend principal (PostgreSQL + Auth + Storage + RPCs).
      responsibilities:
        - Persistencia de todas las entidades de negocio.
        - Autenticación y sesiones.
        - RLS para aislamiento por usuario.
        - RPCs de dominio (seats_remaining, create_*_subscription, etc.).
    - name: Stripe
      description: Pasarela de pagos y gestión de suscripciones.
      responsibilities:
        - Checkout de suscripciones y pagos únicos.
        - Customer Portal para gestión de suscripciones por el usuario.
        - Webhooks para sincronizar eventos a Supabase.
    - name: Next.js
      description: Framework full-stack React para routing, server components y API routes.
    - name: React / TypeScript
      description: Motor de UI y tipado estático del dominio.
    - name: Google Translate API (no oficial)
      description: Traducción automática en `scripts/sync-i18n.ts` para sincronizar mensajes.

  internal:
    - name: database
      description: Esquema SQL, migraciones y scripts de diagnóstico en `database/`.
    - name: rpc-layer
      description: Capa de funciones PL/pgSQL que encapsulan reglas de negocio sensibles (suscripciones, seats, códigos).
    - name: domain-libs
      description: Librerías de dominio en `src/lib/*` que envuelven Supabase/Stripe y exponen funciones de alto nivel a las rutas.

flows:
  - name: alta_usuario_y_login
    description: Registro de cuenta, login y establecimiento de sesión.
  - name: alta_suscripcion
    description: Elección de plan o código de acceso, checkout Stripe o creación directa y activación de suscripción.
  - name: renovacion_suscripcion
    description: Renovación de suscripciones existentes desde `/billing/renew` con Stripe.
  - name: alta_jugador
    description: Creación de jugador vinculado a una suscripción (con verificación previa de seats).
  - name: gestion_partido
    description: Creación, edición, seguimiento en vivo y cierre de partidos, incluyendo estadísticas y multimedia.
  - name: gestion_media
    description: Captura, almacenamiento y sincronización de fotos/vídeos de partidos.
  - name: pwa_offline
    description: Uso de la aplicación como PWA con funcionalidad básica offline y sincronización posterior.

entities:
  - users
  - players
  - seasons
  - competitions
  - matches
  - match_media
  - sports
  - sport_categories
  - subscriptions
  - subscription_plans
  - subscription_players
  - access_codes
  - access_code_usages
  - payments

guardrails:
  - Toda acción que lea o modifique datos de dominio debe respetar RLS de Supabase y filtrar explícitamente por `user_id` del usuario autenticado.
  - Uso de cliente admin de Supabase (service role) solo tras verificar ownership/permiso con el cliente normal y documentarlo en la spec correspondiente.
  - Definición canónica de "suscripción activa":
    - status textual compatible con Stripe (p.ej. `active` o `trialing` según el caso de uso),
    - y `current_period_end > now()` (o `current_period_end IS NULL` para suscripciones sin caducidad).
  - Lógica de seats centralizada en RPC `seats_remaining` + wrapper `getSeatStatus`; no introducir nuevos cálculos alternativos.
  - No se pueden crear nuevos jugadores si `seats_remaining <= 0`; la UI debe mostrar mensaje claro y CTA a ampliación de suscripción.
  - Límite de competiciones por temporada (`LIMITS.COMPETITION_NUM_MAX_BY_SEASON`) debe aplicarse de forma consistente en frontend y backend.
  - Media de partidos se guarda localmente por defecto (IndexedDB); subir a la nube solo cuando `NEXT_PUBLIC_CLOUD_MEDIA` lo permita y esté claramente reflejado en la spec y en las páginas legales.
  - Cualquier cambio en el modelo de `stats` por deporte debe actualizar tanto la spec de `matches`/`statistics` como los tipos TS para evitar incoherencias.
  - Los textos legales (`legal.*`) son fuente de verdad sobre privacidad/menores; cambios sustanciales deben ir acompañados de revisión de flujos técnicos afectados (signup, media, sharing, etc.).
  - Todas las nuevas features deben:
    - Tener claves i18n en todos los idiomas soportados.
    - Tener al menos tests básicos de dominio (o ser anotadas como deuda técnica explícita).

rules:
  proposal:
    - Mantener las propuestas por debajo de ~700 palabras, con foco en el problema, el alcance y los impactos.
    - Incluir siempre secciones de "Objetivos" y "No objetivos".
  specs:
    - Usar formato RF-x con criterios de aceptación claros, inputs, outputs y flujos.
    - Documentar modelos de datos y contratos de APIs/RPCs cuando apliquen.
    - Señalar explícitamente dependencias con otros módulos (ej. suscripciones ↔ players).
  tasks:
    - Dividir el trabajo en tareas pequeñas (idealmente < 2h) e incluir pasos de verificación/test.
    - Etiquetar tareas que afecten a SQL o Stripe para revisión extra.
  code:
    - Respetar tipado estricto (evitar `any` salvo en fronteras externas bien documentadas).
    - Mantener lógica de dominio en `src/lib/*` y dejar las rutas como orquestadores finos.

agent_sdd:
  description: Agente de Diseño Dirigido por Specs (SDD) para DeporTeen.
  goals:
    - Mantener alineados código, base de datos y OpenSpec a medida que el proyecto evoluciona.
    - Proponer cambios coherentes con los guardrails legales, de negocio y técnicos.
    - Generar y actualizar specs, diseños y tareas antes de tocar el código.
  prompts:
    system: |
      Actúas como arquitecto y desarrollador senior de DeporTeen.
      Debes respetar siempre las reglas de negocio sobre menores, suscripciones y seats,
      y mantener la coherencia entre código, SQL, Stripe e i18n.
      Antes de cambiar código, piensa en términos de módulos y specs OpenSpec.
    style: |
      - Explica brevemente la intención de cada cambio.
      - Señala impactos cruzados (otros módulos, BD, i18n, PWA).
      - Evita cambios masivos sin specs previas; prioriza iteraciones pequeñas y trazables.
  skills:
    - name: nextjs_app_router
      description: Diseñar y modificar rutas y componentes server/client en Next.js App Router.
      required_knowledge:
        - Diferenciar componentes server/client y sus limitaciones.
        - Usar loaders server-side con Supabase y pasar datos a componentes cliente.
    - name: supabase_sql_rpc
      description: Entender y ajustar esquema SQL, RLS y funciones PL/pgSQL en Supabase.
      required_knowledge:
        - Cómo mapear código TS a tablas/RPCs.
        - Cómo evitar ambigüedades y errores de tipo en funciones PL/pgSQL.
    - name: stripe_payments
      description: Integrar y mantener flujos de pago, webhooks y portal de cliente con Stripe.
      required_knowledge:
        - Crear sesiones de checkout/portal seguras.
        - Diseñar lógica idempotente en webhooks y sincronización con Supabase.
    - name: domain_testing
      description: Escribir y mantener tests de dominio con Vitest y Testing Library.
      required_knowledge:
        - Mockear Supabase/Stripe y Next.js.
        - Traducir RF/escenarios OpenSpec en tests ejecutables.
    - name: internationalization
      description: Mantener i18n sincronizado (mensajes, claves, idiomas, scripts).
      required_knowledge:
        - Uso de `tServer`/hooks de traducción.
        - Uso y límites del script `scripts/sync-i18n.ts`.
    - name: pwa_offline_behavior
      description: Diseñar y mantener el comportamiento PWA y soporte offline parcial.
      required_knowledge:
        - Patrones de caché en service workers.
        - Coordinación entre IndexedDB, media local y sincronización a cloud.